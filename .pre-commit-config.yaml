---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # 1. File hygiene — fastest checks, run first
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure file ends with a newline
      - id: mixed-line-ending
        name: Normalize mixed line endings
      - id: check-added-large-files
        name: Prevent adding large files
      - id: check-json
        name: Validate JSON files
      - id: check-yaml
        name: Validate YAML files
        args: [--unsafe]

  # 2. Python formatting — before linting so ruff sees clean code
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-format
        name: Ruff code formatter for Python
      - id: ruff
        name: Ruff linter for Python
        args: [--fix, --exit-non-zero-on-fix]

  # # 3. Dockerfile linting
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.14.0
  #   hooks:
  #     - id: hadolint-docker
  #       name: Lint Dockerfile

  # 4. Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        name: Markdown Linting
...
