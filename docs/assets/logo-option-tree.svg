<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- BGP tree / hierarchy structure -->
  <!-- Root node -->
  <circle cx="50" cy="15" r="5" fill="#4F46E5"/>

  <!-- Branch lines from root -->
  <line x1="50" y1="20" x2="30" y2="35" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="50" y1="20" x2="50" y2="35" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="50" y1="20" x2="70" y2="35" stroke="#4F46E5" stroke-width="1.5"/>

  <!-- Second level nodes -->
  <circle cx="30" cy="40" r="4" fill="#4F46E5"/>
  <circle cx="50" cy="40" r="4" fill="#4F46E5"/>
  <circle cx="70" cy="40" r="4" fill="#4F46E5"/>

  <!-- Branches from second level -->
  <line x1="30" y1="44" x2="20" y2="55" stroke="#4F46E5" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="44" x2="40" y2="55" stroke="#4F46E5" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="44" x2="60" y2="55" stroke="#4F46E5" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="44" x2="80" y2="55" stroke="#4F46E5" stroke-width="1.5" opacity="0.7"/>

  <!-- Leaf nodes -->
  <circle cx="20" cy="60" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="40" cy="60" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="60" cy="60" r="3" fill="#4F46E5" opacity="0.8"/>
  <circle cx="80" cy="60" r="3" fill="#4F46E5" opacity="0.8"/>
</svg>
