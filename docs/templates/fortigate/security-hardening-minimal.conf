! FortiGate: Security Hardening Minimal Configuration
! Core security controls

config system global
  set admintimeout 10
  set timezone "UTC"
  set ntp-server 169.254.169.123
  set ntp-sync-interval 60
  set log-utc enable
  set fds-statistics disable
  set send-pmtu-icmp enable
  set accept-source-route disable
  set accept-redirects disable
  set revoke-wan-access disable
  set cfg-save-status enable
end

config system ntp
  set ntpsync enable
  set type fortiguard
  set server "0.ubuntu.pool.ntp.org" "1.ubuntu.pool.ntp.org"
end

config log syslogd setting
  set status enable
  set server 192.0.2.50
  set port 514
  set facility local7
  set source-ip 10.0.0.1
end

config log disk setting
  set status enable
  set diskfull-action overwrite
end

config firewall schedule onetime
  edit "business-hours"
    set start-time 09:00
    set end-time 18:00
  next
end

config system interface
  edit "port1"
    set vdom "root"
    set ip 192.168.1.1 255.255.255.0
    set allowaccess ping https ssh
    set administrative-access-product-bundle implicit
  next
end

config system snmp community
  edit 1
    set name "public"
    set hosts 192.0.2.100
    set status enable
  next
  edit 2
    set name "private"
    set hosts 192.0.2.100
    set hosts 192.0.2.101
  next
end

config firewall service custom
  edit "allow-snmp"
    set tcp-portrange 161
    set udp-portrange 161
  next
end

config firewall policy
  edit 1
    set name "SNMP-Monitor"
    set srcintf "port1"
    set dstintf "port1"
    set srcaddr "all"
    set dstaddr "all"
    set service "allow-snmp"
    set action accept
    set schedule "always"
  next
end

config system global
  set block-session-timer 300
  set dh-params 2048
  set strong-crypto enable
end
