! FortiGate: BGP Minimal Configuration
! Single EBGP peering session

config router bgp
  set as 65000
  set router-id 10.0.0.1
  config neighbor
    edit "10.0.0.2"
      set remote-as 65001
    next
  end
  config address-family ipv4 unicast
    edit "10.0.0.2"
      set activate enable
    next
  end
  config network
    edit 1
      set prefix 10.1.0.0 255.255.0.0
    next
    edit 2
      set prefix 10.2.0.0 255.255.0.0
    next
  end
end
