! FortiGate: BFD Minimal Configuration
! Bidirectional Forwarding Detection for fast link failure detection

config system bfd
  set default-multiplier 3
  set default-min-rx 300
  set default-min-tx 300
end

config router bfd
  config neighbor
    edit 1
      set ip 10.0.0.2
      set interface "port1"
      set multiplier 3
      set min-rx 300
      set min-tx 300
    next
  end
end

config router bgp
  set as 65000
  set router-id 10.0.0.1
  config neighbor
    edit "10.0.0.2"
      set remote-as 65001
      set bfd enable
    next
  end
  config network
    edit 1
      set prefix 10.1.0.0 255.255.0.0
    next
  end
end
