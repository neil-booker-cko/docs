! FortiGate: HA Minimal Configuration
! Active-Passive redundancy (FGCP - FortiGate Clustering Protocol)

config system ha
  set mode a-p
  set group-name "FGT-GROUP"
  set priority 200
  set interface "port3"
  set ha-mgmt-status enable
  set ha-mgmt-interfaces
    config ha-mgmt-interface
      edit 1
        set interface "port1"
      next
    end
  next
  set hbdev "port3" 0
  set session-sync enable
  set override disable
  set password "HA_PASSWORD_HERE"
  set heartbeat-interval 2
  set heartbeat-lost-threshold 20
end

config system interface
  edit "port3"
    set vdom "root"
    set ip 192.168.100.1 255.255.255.0
    set type physical
  next
end
