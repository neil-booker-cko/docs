! FortiGate: IPsec VPN Minimal Configuration
! Route-based tunnel with IKEv2 and BGP

config vpn ipsec phase1-interface
  edit "tunnel1"
    set interface "port1"
    set ike-version 2
    set peertype any
    set peer 203.0.113.2
    set psksecret "PSK_PASSWORD_HERE"
    set proposal aes256-sha256
    set dhgrp 14
    set lifetime 28800
    set nattraversal enable
    set dpd on-demand
  next
end

config vpn ipsec phase2-interface
  edit "tunnel1"
    set phase1name "tunnel1"
    set proposal aes256-sha256
    set pfs enable
    set dhgrp 14
    set lifetime 3600
  next
end

config system interface
  edit "tunnel1"
    set vdom "root"
    set ip 10.255.0.1 255.255.0.0
    set type tunnel
    set remote-ip 10.255.0.2
    set interface "port1"
  next
end

config router bgp
  set as 65000
  set router-id 10.0.0.1
  config neighbor
    edit "10.255.0.2"
      set remote-as 65001
      set ebgp-multihop 2
    next
  end
  config network
    edit 1
      set prefix 10.1.0.0 255.255.0.0
    next
  end
end
