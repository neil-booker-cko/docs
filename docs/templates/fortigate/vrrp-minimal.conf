! FortiGate: VRRP Minimal Configuration
! Virtual Router Redundancy Protocol for gateway failover

config system vrrp
  edit 1
    set vrdst 10.0.0.0 255.255.0.0
    set interface "port1"
    set vrtype v2
    set vrid 100
    set priority 150
    set adv-interval 1
    set preempt enable
    set status enable
    set version 2
  next
end

config firewall addrgrp
  edit "internal-subnets"
    set member "internal-subnet-1"
  next
end

config firewall address
  edit "internal-subnet-1"
    set subnet 10.1.0.0 255.255.0.0
  next
end

config firewall policy
  edit 1
    set srcintf "port2"
    set dstintf "port1"
    set srcaddr "internal-subnets"
    set dstaddr "all"
    set action accept
    set schedule "always"
    set service "ALL"
  next
end
