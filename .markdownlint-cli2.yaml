---
config:
  # MD013/line-length: Set to 88 to match Python PEP 8 standard.
  MD013:
    line_length: 88
    heading_line_length: 88
    code_block_line_length: 120
    tables: false

  # MD024/no-duplicate-heading: Allow duplicate headings as long as they
  # are in different sections (e.g., multiple "Examples" headers).
  MD024:
    siblings_only: true

  # MD033/no-inline-html: Allow specific tags like <br> for manual line breaks.
  MD033:
    allowed_elements:
      - br
      - details
      - summary

  # MD041/first-line-h1: Ensure every file starts with a top-level heading.
  MD041: true
...
