site_name: Network Engineering Reference
site_description: Protocol packet formats, routing design, vendor implementation guides, and quick-reference cheat sheets for network engineers.
site_url: https://network-engineering.example.com/
repo_url: https://github.com/user/network-engineering-docs
copyright: Copyright &copy; 2024 Network Engineering Reference. All rights reserved.
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - footnotes
  - sane_lists
  - toc:
      permalink: true
      baselevel: 2

hooks:
  - hooks.py

plugins:
  - search
  - minify:
      minify_html: false
      minify_js: true
      minify_css: true

