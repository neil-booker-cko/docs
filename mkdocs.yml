site_name: Network Engineering Reference
site_description: Protocol packet formats, routing design, vendor implementation guides, and quick-reference cheat sheets for network engineers.
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

hooks:
  - hooks.py

plugins:
  - search
  - minify:
      minify_html: false
      minify_js: true
      minify_css: true

nav:
  - Home: index.md
  - Theory:
      - BGP vs BFD: theory/bgp_bfd_comparison.md
      - OSPF vs BFD: theory/ospf_bfd_comparison.md
      - EIGRP vs BFD: theory/eigrp_bfd_comparison.md
      - EIGRP vs OSPF vs RIP: theory/igp_comparison.md
      - NTP vs PTP: theory/ntp_vs_ptp.md
  - Cisco:
      - BFD Core Config: cisco/cisco_bfd_config_guide.md
      - Static BFD: cisco/cisco_static_bfd_guide.md
      - Multihop BFD: cisco/cisco_multihop_bfd_guide.md
      - Active/Passive to AWS TGW: cisco/cisco_aws_tgw_dx.md
  - FortiGate:
      - BFD Core Config: fortigate/fortigate_bfd_config_guide.md
      - Multihop BFD: fortigate/fortigate_multihop_bfd_guide.md
      - Static BFD & Health Checks: fortigate/fortigate_static_bfd_guide.md
  - AWS Architecture:
      - BGP Stack (Flagship): aws/bgp_stack_vpn_over_dx.md
      - BGP over VPN Optimization: aws/bgp_vpn_optimization.md
      - FortiGate to TGW (ECMP): aws/fortigate_bgp_vpn_bfd.md
      - Troubleshooting VPN & BGP Logs: aws/troubleshooting_vpn_bgp_log_analysis_guide.md
  - Azure Architecture:
      - BGP Stack (Flagship): azure/bgp_stack_vpn_over_expressroute.md
      - Active-Active VPN Optimization: azure/bgp_vpn_optimization.md
      - Troubleshooting VPN & BGP Logs: azure/troubleshooting_vpn_bgp_log_analysis_guide.md
  - GCP Architecture:
      - BGP Stack (Flagship): gcp/bgp_stack_vpn_over_interconnect.md
      - HA VPN Optimization: gcp/bgp_vpn_optimization.md
      - Troubleshooting VPN & BGP Logs: gcp/troubleshooting_vpn_bgp_log_analysis_guide.md
  - Packet Headers:
      - Overview: packets/index.md
      - Layer 2 — Data Link:
          - Ethernet II: packets/ethernet.md
          - ARP: packets/arp.md
      - Layer 3 — Network:
          - IPv4: packets/ipv4.md
          - IPv6: packets/ipv6.md
          - ICMP: packets/icmp.md
      - Layer 4 — Transport:
          - TCP: packets/tcp.md
          - UDP: packets/udp.md
          - BFD: packets/bfd.md
  - Routing Protocols:
      - Overview: routing/index.md
      - BGP: routing/bgp.md
      - OSPF: routing/ospf.md
      - EIGRP: routing/eigrp.md
      - RIP: routing/rip.md
      - IGRP: routing/igrp.md
  - Application Protocols:
      - Overview: application/index.md
      - HTTP / HTTPS: application/http.md
      - DNS: application/dns.md
      - PTP: application/ptp.md
      - SSH: application/ssh.md
      - SNMP: application/snmp.md
      - Syslog: application/syslog.md
  - Reference:
      - Overview: reference/index.md
      - IP Network Ranges: reference/ip_networks.md
      - TCP/UDP Ports: reference/ports.md
      - BGP Path Selection: reference/bgp_path_selection.md
      - Administrative Distance: reference/admin_distance.md

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.esm.min.mjs
